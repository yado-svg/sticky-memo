<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#4a6888">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>AQSEE Memo</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Klee+One&family=Outfit:wght@400;600&family=Zen+Maru+Gothic:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:'Zen Maru Gothic',sans-serif;background:transparent}
.note{position:fixed;width:280px;height:300px;top:40px;right:40px;display:flex;flex-direction:column;border-radius:4px;background:#4a6888;box-shadow:0 4px 24px rgba(42,56,72,.22),0 1px 4px rgba(42,56,72,.15);user-select:none;z-index:9999;transition:box-shadow .15s}
.note.dragging{box-shadow:0 12px 40px rgba(42,56,72,.32)}
.hdr{display:flex;align-items:center;height:28px;min-height:28px;flex-shrink:0;padding:0 2px 0 6px;cursor:grab;border-radius:4px 4px 0 0;background:rgba(0,0,0,.08);gap:4px}
.logo{display:flex;align-items:center;gap:3px;pointer-events:none;flex-shrink:0}
.logo svg{width:14px;height:14px}
.logo-text{font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;color:#dbd8d3;letter-spacing:2.5px;opacity:.7}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;transition:all .4s;margin-left:2px}
.sync-dot.off{background:rgba(219,216,211,.15)}.sync-dot.on{background:#dbd8d3;box-shadow:0 0 5px rgba(219,216,211,.4);animation:pulse 2.5s ease infinite}.sync-dot.err{background:#c0392b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-s{flex:1}
.hbtn{width:20px;height:20px;flex-shrink:0;background:transparent;border:none;color:rgba(219,216,211,.2);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;border-radius:3px}
.hbtn:hover{background:rgba(219,216,211,.08);color:rgba(219,216,211,.55)}
.hbtn.del-tab{font-size:12px}.hbtn.del-tab:hover{color:#e8a87c;background:rgba(232,168,124,.08)}
.hbtn.close:hover{color:#e8a87c;background:rgba(232,168,124,.08)}
.tab-bar{display:flex;align-items:end;height:24px;min-height:24px;flex-shrink:0;padding:0 4px;gap:1px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(219,216,211,.06)}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:3px 10px 2px;font-size:9px;font-weight:500;color:rgba(219,216,211,.25);cursor:pointer;transition:all .1s;white-space:nowrap;flex-shrink:0;border-radius:4px 4px 0 0;background:transparent}
.tab:hover{background:rgba(255,255,255,.06);color:rgba(219,216,211,.5)}
.tab.active{background:rgba(255,255,255,.1);color:#dbd8d3;font-weight:700}
.tab-add{width:18px;height:18px;flex-shrink:0;background:transparent;border:none;color:rgba(219,216,211,.18);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px}
.tab-add:hover{background:rgba(219,216,211,.06);color:rgba(219,216,211,.5)}
.content{flex:1;position:relative;overflow:hidden}
.mp{position:absolute;inset:0;display:none;flex-direction:column}.mp.active{display:flex}
.ma{flex:1;background:transparent;border:none;outline:none;resize:none;padding:6px 10px;font-size:12px;line-height:1.7;font-family:'Klee One',sans-serif;color:rgba(219,216,211,.85);user-select:text;cursor:text}
.ma::placeholder{color:rgba(219,216,211,.2);font-size:11px}
.ma::selection{background:rgba(219,216,211,.15)}
.ma::-webkit-scrollbar{width:2px}.ma::-webkit-scrollbar-thumb{background:rgba(219,216,211,.1);border-radius:2px}
.bbar{height:20px;flex-shrink:0;display:flex;align-items:center;padding:0 8px;border-top:1px solid rgba(219,216,211,.04)}
.cc{margin-left:auto;font-size:8px;color:rgba(219,216,211,.15)}
.resize{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;opacity:0;transition:opacity .15s;color:rgba(219,216,211,.2)}
.note:hover .resize{opacity:.3}
.tab-ren{background:transparent;border:none;outline:none;border-bottom:1px solid rgba(219,216,211,.4);font-size:9px;font-weight:700;color:#dbd8d3;width:36px;cursor:text}
@media all and (display-mode:standalone),(max-width:500px){.note{position:relative;top:0;right:0;width:100%!important;height:100%!important;box-shadow:none;border-radius:0}.hdr{border-radius:0;cursor:default}.resize,.hbtn.close{display:none}}
.modal-bg{position:fixed;inset:0;background:rgba(42,56,72,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:10px;padding:20px;width:100%;max-width:320px;color:#2a3848;box-shadow:0 8px 30px rgba(42,56,72,.25)}
.modal h2{font-size:13px;margin-bottom:4px;color:#3a5a74}.modal p{font-size:10px;color:#8a9aaa;margin-bottom:12px;line-height:1.6}
.modal label{display:block;font-size:9px;font-weight:700;color:#4a6888;margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea{width:100%;padding:7px 9px;border:1px solid #dbd8d3;border-radius:6px;font-size:11px;outline:none;color:#2a3848}
.modal input:focus,.modal textarea:focus{border-color:#4a6888}
.modal textarea{height:60px;resize:vertical;font-family:monospace;font-size:10px}
.modal .hint{font-size:8px;color:#aaa;margin-top:2px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.mg{background:#4a6888;color:#dbd8d3}.mg:hover{background:#3a5a74}
.ms{background:#dbd8d3;color:#4a6888}.ms:hover{background:#ccc9c4}
.modal .err{color:#c0392b;font-size:9px;margin-top:6px;display:none}
.hidden{display:none!important}</style></head>
<body>
<div class="modal-bg hidden" id="sM"><div class="modal">
<h2>⚙ 同期設定</h2>
<p>Firebaseで端末間同期。スキップでローカル専用。</p>
<label>Firebase Config</label>
<textarea id="cfgI" placeholder='{"apiKey":"...","databaseURL":"..."}'></textarea>
<div class="hint">Firebase Console &gt; マイアプリ &gt; config</div>
<label>同期コード</label>
<input type="text" id="rmI" placeholder="myroom123">
<div class="err" id="sE"></div>
<div class="modal-btns"><button class="ms" id="bSk">スキップ</button><button class="mg" id="bCo">接続</button></div>
</div></div>
<div class="note" id="N">
<div class="hdr" id="H">
<div class="logo"><svg viewBox="0 0 96 136" fill="none"><path d="M48,6 L14,130 L28,130 L48,52 L68,130 L82,130Z" fill="#dbd8d3" opacity=".15" transform="translate(-3,-2)"/><path d="M48,6 L14,130 L28,130 L48,52 L68,130 L82,130Z" fill="#dbd8d3" opacity=".35" transform="translate(-1.5,-1)"/><path d="M48,6 L14,130 L28,130 L48,52 L68,130 L82,130Z" fill="#dbd8d3"/></svg><span class="logo-text">AQSEE</span></div>
<div class="sync-dot off" id="sD"></div>
<span class="hdr-s"></span>
<button class="hbtn" id="bCf">⚙</button>
<button class="hbtn del-tab" id="bDt" title="タブ削除">🗑</button>
<button class="hbtn close" id="bCl">&times;</button></div>
<div class="tab-bar" id="T"><button class="tab-add" id="tA">+</button></div>
<div class="content" id="C"></div>
<div class="bbar" id="bb"><span class="cc" id="cc">0</span></div>
<div class="resize" id="R"><svg width="14" height="14" viewBox="0 0 16 16"><path d="M14 2L2 14M14 6L6 14M14 10L10 14" stroke="currentColor" stroke-opacity=".4" stroke-width="1.5" stroke-linecap="round"/></svg></div>
</div>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
(function(){
var SK='smemo_v8',CK='smemo_cfg',st={tabs:[],at:null,x:null,y:null,w:280,h:300};
var $n=document.getElementById('N'),$h=document.getElementById('H'),$tb=document.getElementById('T'),$ta=document.getElementById('tA'),$ct=document.getElementById('C'),$cc=document.getElementById('cc'),$rz=document.getElementById('R'),$dot=document.getElementById('sD');
document.getElementById('bDt').addEventListener('click',function(){if(st.tabs.length>1){var c=gAT();if(c)rm(c.id)}});
var fbRef=null,fbOK=0,skipR=0,wt=null;
function initFB(){var c;try{c=JSON.parse(localStorage.getItem(CK))}catch(e){}if(!c||!c.config||!c.room)return;try{firebase.initializeApp(c.config);fbRef=firebase.database().ref('rooms/'+c.room);fbOK=1;$dot.className='sync-dot on';fbRef.on('value',function(s){var v=s.val();if(!v||skipR)return;if(v.tabs){st.tabs.forEach(function(t){if(t.tE)t.tE.remove();if(t.pE)t.pE.remove()});st.tabs=[];v.tabs.forEach(function(d){var t=mkD(d.id,d.nm);t.tx=d.tx||'';rBtn(t);rP(t)});if(v.at)sw(v.at,1);saveL()}})}catch(e){$dot.className='sync-dot err'}}
function syncR(){if(!fbOK)return;if(wt)clearTimeout(wt);wt=setTimeout(function(){skipR=1;fbRef.set({tabs:st.tabs.map(function(t){return{id:t.id,nm:t.nm,tx:t.tx}}),at:st.at}).then(function(){setTimeout(function(){skipR=0},500)}).catch(function(){skipR=0;$dot.className='sync-dot err'})},400)}
function saveL(){try{localStorage.setItem(SK,JSON.stringify({tabs:st.tabs.map(function(t){return{id:t.id,nm:t.nm,tx:t.tx}}),at:st.at,x:st.x,y:st.y,w:st.w,h:st.h}))}catch(e){}}
function save(){saveL();syncR()}
function load(){try{var r=localStorage.getItem(SK);if(!r)return!1;var d=JSON.parse(r);if(!d||!d.tabs||!d.tabs.length)return!1;if(d.w)st.w=d.w;if(d.h)st.h=d.h;var p=matchMedia('(display-mode:standalone)').matches||innerWidth<=500;if(d.x!=null&&!p){st.x=d.x;st.y=d.y;$n.style.left=d.x+'px';$n.style.top=d.y+'px';$n.style.right='auto'}if(!p){$n.style.width=st.w+'px';$n.style.height=st.h+'px'}d.tabs.forEach(function(td){var t=mkD(td.id,td.nm);t.tx=td.tx||'';rBtn(t);rP(t)});if(d.at)sw(d.at,1);return!0}catch(e){return!1}}
var drag=0,dsx,dsy,dnx,dny;
$h.addEventListener('mousedown',function(e){if(e.target.closest('button')||e.target.closest('.logo')||e.target.classList.contains('sync-dot'))return;if(matchMedia('(display-mode:standalone)').matches||innerWidth<=500)return;e.preventDefault();drag=1;var r=$n.getBoundingClientRect();dsx=e.clientX;dsy=e.clientY;dnx=r.left;dny=r.top;$n.classList.add('dragging')});
$h.addEventListener('touchstart',function(e){if(e.target.closest('button')||e.target.closest('.logo'))return;if(matchMedia('(display-mode:standalone)').matches||innerWidth<=500)return;var t=e.touches[0];drag=1;var r=$n.getBoundingClientRect();dsx=t.clientX;dsy=t.clientY;dnx=r.left;dny=r.top},{passive:1});
var rzg=0,rx,ry,rw,rh;
$rz.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();rzg=1;rx=e.clientX;ry=e.clientY;rw=st.w;rh=st.h});
document.addEventListener('mousemove',function(e){if(drag){$n.style.left=(dnx+e.clientX-dsx)+'px';$n.style.top=(dny+e.clientY-dsy)+'px';$n.style.right='auto';st.x=parseInt($n.style.left);st.y=parseInt($n.style.top)}if(rzg){st.w=Math.max(200,rw+e.clientX-rx);st.h=Math.max(160,rh+e.clientY-ry);$n.style.width=st.w+'px';$n.style.height=st.h+'px'}});
document.addEventListener('touchmove',function(e){if(drag){var t=e.touches[0];$n.style.left=(dnx+t.clientX-dsx)+'px';$n.style.top=(dny+t.clientY-dsy)+'px';$n.style.right='auto';st.x=parseInt($n.style.left);st.y=parseInt($n.style.top)}},{passive:1});
document.addEventListener('mouseup',function(){if(drag){drag=0;$n.classList.remove('dragging');saveL()}if(rzg){rzg=0;saveL()}});
document.addEventListener('touchend',function(){if(drag){drag=0;saveL()}});
document.getElementById('bCl').addEventListener('click',function(){$n.style.transition='all .15s';$n.style.transform='scale(.9)';$n.style.opacity='0';setTimeout(function(){window.close();$n.style.display='none'},150)});
var $m=document.getElementById('sM');
document.getElementById('bCf').addEventListener('click',function(){$m.classList.remove('hidden')});
document.getElementById('bSk').addEventListener('click',function(){$m.classList.add('hidden')});
document.getElementById('bCo').addEventListener('click',function(){var $e=document.getElementById('sE'),ct=document.getElementById('cfgI').value.trim(),rm=document.getElementById('rmI').value.trim();if(!ct||!rm){$e.textContent='Config\u3068\u30b3\u30fc\u30c9\u3092\u5165\u529b';$e.style.display='block';return}try{var c=JSON.parse(ct);if(!c.databaseURL){$e.textContent='databaseURL\u304c\u5fc5\u8981';$e.style.display='block';return}localStorage.setItem(CK,JSON.stringify({config:c,room:rm}));$m.classList.add('hidden');location.reload()}catch(e){$e.textContent='JSON\u30a8\u30e9\u30fc';$e.style.display='block'}});
try{var ec=JSON.parse(localStorage.getItem(CK));if(ec){document.getElementById('cfgI').value=JSON.stringify(ec.config,null,2);document.getElementById('rmI').value=ec.room||''}}catch(e){}
function gid(){return 't'+Date.now()+'_'+Math.random().toString(36).substr(2,3)}
function mkD(id,nm){id=id||gid();nm=nm||''+(st.tabs.length+1);var t={id:id,nm:nm,tx:'',tE:null,pE:null,aE:null};st.tabs.push(t);return t}
function nt(nm){var t=mkD(null,nm);rBtn(t);rP(t);sw(t.id);save();if(t.aE)setTimeout(function(){t.aE.focus()},50);return t}
function rBtn(t){var b=document.createElement('div');b.className='tab';b.dataset.id=t.id;b.textContent=t.nm;b.addEventListener('click',function(e){e.stopPropagation();sw(t.id)});b.addEventListener('dblclick',function(e){e.stopPropagation();var inp=document.createElement('input');inp.className='tab-ren';inp.value=t.nm;b.textContent='';b.appendChild(inp);inp.focus();inp.select();function done(){var v=inp.value.trim();if(v)t.nm=v;b.textContent=t.nm;save()}inp.addEventListener('blur',done);inp.addEventListener('keydown',function(ev){if(ev.key==='Enter'){ev.preventDefault();inp.blur()}if(ev.key==='Escape'){inp.value=t.nm;inp.blur()}});inp.addEventListener('mousedown',function(ev){ev.stopPropagation()})});$tb.insertBefore(b,$ta);t.tE=b}
function rP(t){var p=document.createElement('div');p.className='mp';p.dataset.id=t.id;var a=document.createElement('textarea');a.className='ma';a.placeholder='\u30e1\u30e2\u3092\u5165\u529b...';a.value=t.tx||'';a.addEventListener('input',function(){t.tx=a.value;uc(t);save()});p.appendChild(a);$ct.appendChild(p);t.pE=p;t.aE=a}
function sw(id,n){st.at=id;st.tabs.forEach(function(t){var a=t.id===id;if(t.tE)t.tE.classList.toggle('active',a);if(t.pE)t.pE.classList.toggle('active',a)});var c=gAT();if(c){uc(c);if(c.aE&&document.hasFocus())c.aE.focus()}if(!n)save()}
function rm(id){if(st.tabs.length<=1)return;var i=st.tabs.findIndex(function(t){return t.id===id});if(i<0)return;var t=st.tabs[i];if(t.tE)t.tE.remove();if(t.pE)t.pE.remove();st.tabs.splice(i,1);if(st.at===id)sw(st.tabs[Math.min(i,st.tabs.length-1)].id);save()}
function gAT(){return st.tabs.find(function(t){return t.id===st.at})||st.tabs[0]}
function uc(t){$cc.textContent=(t.tx||'').length}
var ld=load();if(!ld){var t1=nt('memo');t1.tx='\u2699 \u540c\u671f\u8a2d\u5b9a\nW\u30af\u30ea\u30c3\u30af\u3067\u30bf\u30d6\u540d\u5909\u66f4\n\U0001f5d1 \u3067\u4eca\u306e\u30bf\u30d6\u3092\u524a\u9664\n+ \u3067\u65b0\u898f\u30bf\u30d6';if(t1.aE)t1.aE.value=t1.tx;uc(t1);nt('sub');sw(t1.id);saveL()}
initFB();
$ta.addEventListener('click',function(e){e.stopPropagation();nt()});
document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='t'||e.key==='n')){e.preventDefault();nt()}});
})();</script>
</body></html>
